[package]
name = "tiexiu"
version = "0.1.0"
edition = "2021"

[dependencies]
# --- LIBRARY & BINARY SHARED DEPENDENCIES ---
# These are the "172-line engine" essentials
serde = { version = "1.0", features = ["derive"] }
pathlib = "0.3.0" # Or any other core logic tools

# --- BINARY-ONLY DEPENDENCIES ---
# Mark these as optional so the lib doesn't bake them in by default
clap = { version = "4.0", features = ["derive"], optional = true }

[features]
# The 'default' feature is what 'cargo build' uses for the lib.
# We leave it empty so the lib is lean.
default = []

# We create a 'cli' feature that toggles the binary's tools.
cli = ["dep:clap"]

[[bin]]
name = "tx"
path = "src/main.rs"
# This tells Cargo: "Only build this binary if 'cli' is active"
required-features = ["cli"]
