version: 2

build:
  os: ubuntu-22.04
  tools:
    rust: "stable" # Or your preferred version like 1.80
  jobs:
    post_install:
      # Install mdbook via cargo
      - cargo install mdbook
    build:
      html:
        # Generate the book and move it to the expected output directory
        - mdbook build
        - mkdir -p $READTHEDOCS_OUTPUT/html/
        - cp -r book/html/* $READTHEDOCS_OUTPUT/html/
