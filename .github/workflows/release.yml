name: Release

on:
  workflow_dispatch:
    inputs:
      publish:
        description: 'Upload to PyPI?'
        required: true
        type: boolean
        default: false

# Forces the runner to use the modern Node.js 24 runtime for all actions
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }} (${{ matrix.target || 'default' }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin

    steps:
      # Updated to v6 for Node 24 support
      - uses: actions/checkout@v6

      # Updated to v6 for Node 24 support
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Build wheels (Linux & macOS)
        if: matrix.os != 'windows-latest'
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --features pyo3 --zig
          sccache: 'true'
          container: off

      - name: Build wheels (Windows)
        if: matrix.os == 'windows-latest'
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --features pyo3
          sccache: 'true'

      # Updated to v7 for Node 24 support
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: dist

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    if: inputs.publish == true
    needs: [build_wheels]
    steps:
      # Updated to v8 for Node 24 compatibility with v7 artifacts
      - name: Download all wheels
        uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: PyO3/maturin-action@v1
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        with:
          command: upload
          args: --non-interactive --skip-existing dist/*
